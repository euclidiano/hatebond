<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hate Bond</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <link rel="icon" href="icone.png" type="image/png">
</head>
<body>
    <div id="context-box">
        <h1>Hate Bond</h1>
        
        <p> Coloque seu nome e o da pessoa para ver quais as chances de vocês se odiarem: </p>
        <br>
        <label for="seu-nome">Seu nome: </label>
        <input type="text" id="seu-nome" name="seu-nome"><br><br>

        <label for="pessoa">Pessoa: </label>
        <input type="text" id="pessoa"><br><br>

        <button id="calcular">Calcular</button>

        <h2 id="resultado"></h2>
        <p id="porcentagem"></p>
    </div>



</body>
</html>
